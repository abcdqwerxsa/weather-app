name: Build APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag (optional, e.g. v1.0.0)'
        required: false
        type: string
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: '0'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      run: npm install

    - name: Generate native Android folder
      run: npx expo prebuild --platform android --no-install

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        if [ -n "${{ secrets.APP_KEYSTORE_BASE64 }}" ]; then
          echo "Building with custom signing key..."
          echo "${{ secrets.APP_KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.APP_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.APP_KEYSTORE_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.APP_KEY_PASSWORD }}"
        else
          echo "Building with default debug signing key..."
          ./gradlew assembleRelease
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: nixin-weather-apk
        path: android/app/build/outputs/apk/release/*.apk

    - name: Upload to Release
      uses: svenstaro/upload-release-action@v2
      if: github.event.inputs.release_tag != ''
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: android/app/build/outputs/apk/release/*.apk
        tag: ${{ github.event.inputs.release_tag }}
        file_glob: true
        overwrite: true
        prerelease: false
